{% extends "template.html" %}

{% block header %}
    <script type="module" src="/src/signIn.js"></script>
{% endblock %}

{% block content %}
    <div class="register-body">
        <section>
            <div class="register-form">
                <h1>Sign In</h1>
                <form>
                    <input type="email" placeholder="Email" id="signInEmail">
                    <input type="password" placeholder="Password" id="signInPass">
                    <button type="button" id="signInBtn" class="mt-4 bg-[rgb(153,128,168)] text-white font-semibold py-2 px-4 rounded-md block transition">Sign In</button>
                </form>
                <p class="signin-footer">Don't have an account? <a href="/register">Sign Up</a></p>
            </div>
        </section>
    </div>
{% endblock %}
