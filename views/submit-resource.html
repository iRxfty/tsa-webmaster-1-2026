{% extends "template.html" %}

{% block header %}
    <script type="module" src="/resource-form.js"></script>
{% endblock %}

{% block content %}
    <div class="page-container min-h-screen">
        <form id="new-resource" class="my-2 bg-white w-3/4 max-w-md px-10 py-10 shadow-md mx-auto transition-transform duration-300 hover:shadow-xl hover:-translate-y-2">
            <h1>Submit New Community Resources</h1><br>
            <label for="rName" required>Resource Name</label>
            <input id="rName" name="rName" type="text" class="form-input">
            <br>
            <div class="block">
                <label for="resourceType">Resource Type:</label>
                <select id="resourceType" name="resourceType" required class="form-input">
                    <option hidden disabled selected value> -- select an option -- </option>
                    <option value="nonprofit">Non-profit</option>
                    <option value="event">Community Event</option>
                    <option value="program">Program</option>
                    <option value="hotline">Support Hotline</option>
                    <option value="info">Information Resource</option>
                    <!-- Resource Classifications: 
                         Non-profit: 501(c)(3) charities and organizations.
                         Community Event: Public gatherings, fundraisers, or town events.
                         Program: Educational, volunteer, or health initiatives.
                         Support Hotline: 24/7 crisis and assistance lines.
                         Information Resource: News outlets, documents, and media. -->
                </select>
            </div>

            <fieldset id="addressBox" class="hidden">
                <legend>Address</legend>
                <label for="streetAddress">Street Address</label>
                <input type="text" name="streetAddress" id="streetAddress" class="form-input">
                <br>
                <label for="town">Town</label>
                <input type="text" id="town" name="town" class="form-input">
                <br>
                <label for="zip">Zip Code</label>
                <input type="number" id="zip" name="zip" pattern="0(7|8)\d{3}" class="form-input">
                <br>
                <label for="state">State</label>
                <input type="text" name="state" id="NJ" value="NJ" readonly class="form-input">
            </fieldset>

            <fieldset id="contactInfo" class="hidden">
                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone" class="form-input">
                <br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" class="form-input">
                
            </fieldset>

            <fieldset id="dates" class="hidden">
                <label for="isMultiDay">Is this Multiple Days?</label>
                <input type="checkbox" name="isMultiDay" id="isMultiDay">

                <div id="singleDate">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" class="form-input">
                </div>

                <div id="dateRange" class="hidden">
                    <label for="startDate">Start Date:</label>
                    <input type="date" name="startDate" id="startDate" class="form-input">
                    <br>
                    <label for="endDate">End Date:</label>
                    <input type="date" name="endDate" id="endDate" class="form-input">
                </div>
            </fieldset>

            <div id="linkBox" class="hidden">
                <label for="link">Link</label>
                <input type="url" name="link" id="link" class="form-input">
            </div>
            <br>
            <label for="desc">Description</label>
            <textarea id="desc" name="desc" class="form-input"></textarea>
            <br>
            <label for="tags">Tags (separate with commas) </label>
            <input type="text" name="tags" class="form-input">
            <input class="mt-4 bg-[rgb(153,128,168)] text-white font-semibold py-2 px-4 rounded-md block transition" type="submit">
        </form>
    </div>
{% endblock %}
