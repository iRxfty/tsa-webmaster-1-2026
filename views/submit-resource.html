{% extends "template.html" %}

{% block header %}
    <script type="module" src="/resource-form.js"></script>
{% endblock %}

{% block content %}
    <div class="page-container h-screen">
        <form id="new-resource" action="/submit-resource" method="post" class="my-2 bg-white w-3/4 px-3">
            <h1>Submit New Community Resources</h1><br>
            <label for="rName" required>Resource Name</label>
            <input id="rName" name="rName" type="text" class="border-dashed border my-2">
            <br>
            <label for="resourceType">Resource Type:</label>
            <select id="resourceType" name="resourceType" required class="border-dashed border my-2">
                <option hidden disabled selected value> -- select an option -- </option>
                <option value="nonprofit">Non-profit</option>
                <option value="event">Community Event</option>
                <option value="program">Program</option>
                <option value="hotline">Support Hotline</option>
                <option value="info">Information Resource</option>
                <!-- TODO: Add clarification of each type of resource -->
            </select>

            <fieldset id="addressBox" class="hidden">
                <legend>Address</legend>
                <label for="streetAddress">Street Address</label>
                <input type="text" name="streetAddress" id="streetAddress" class="border-dashed border my-2">
                <br>
                <label for="town">Town</label>
                <input type="text" id="town" name="town" class="border-dashed border my-2">
                <br>
                <label for="zip">Zip Code</label>
                <input type="number" id="zip" name="zip" pattern="0(7|8)\d{3}" class="border-dashed border my-2">
                <br>
                <label for="state">State</label>
                <input type="text" name="state" id="NJ" value="NJ" readonly class="border-dashed border my-2">
            </fieldset>

            <fieldset id="contactInfo" class="hidden">
                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone" class="border-dashed border my-2">
                <br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" class="border-dashed border my-2">
                
            </fieldset>

            <fieldset id="dates" class="hidden">
                <label for="isMultiDay">Is this Multiple Days?</label>
                <input type="checkbox" name="isMultiDay" id="isMultiDay">

                <div id="singleDate">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" class="border-dashed border my-2">
                </div>

                <div id="dateRange" class="hidden">
                    <label for="startDate">Start Date:</label>
                    <input type="date" name="startDate" id="startDate" class="border-dashed border my-2">
                    <br>
                    <label for="endDate">End Date:</label>
                    <input type="date" name="endDate" id="endDate" class="border-dashed border my-2">
                </div>
            </fieldset>

            <div id="linkBox" class="hidden">
                <label for="link">Link</label>
                <input type="url" name="link" id="link" class="border-dashed border my-2">
            </div>

            <label for="desc">Description</label>
            <textarea id="desc" name="desc" class="border-dashed border my-2"></textarea>

            <input type="submit">
        </form>
    </div>
{% endblock %}
